version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ids_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ids_db
      MYSQL_USER: ids_user
      MYSQL_PASSWORD: ids_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
